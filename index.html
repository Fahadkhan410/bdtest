<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ASFA Secure Live</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; user-select: none; }
        .container { display: flex; height: 100vh; }
        #player-wrapper { flex: 1; background: #000; position: relative; }
        #live-tv-player { width: 100%; height: 100%; object-fit: contain; }
        .sidebar { width: 320px; background: rgba(0,0,0,0.9); border-left: 1px solid #333; display: flex; flex-direction: column; }
        .channel-list { flex: 1; overflow-y: auto; }
        .channel-item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; transition: 0.2s; }
        .channel-item:hover { background: #333; }
        input { width: calc(100% - 20px); margin: 10px; padding: 10px; background: #111; border: 1px solid #444; color: white; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="player-wrapper">
            <video id="live-tv-player" controls preload="auto" crossorigin="anonymous"></video>
        </div>
        <div class="sidebar">
            <input type="text" id="search" placeholder="Search channels...">
            <div class="channel-list" id="channel-list"></div>
        </div>
    </div>

    <script>
        // --- Anti-Inspection Layer ---
        (function() {
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('keydown', e => {
                if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key)) || (e.ctrlKey && e.key === 'u')) {
                    e.preventDefault(); return false;
                }
            });
        })();

        // --- Obfuscated Config ---
        const _0xData = [
            "aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL0ZhaGFka2hhbjQxMC9iZHRlc3QvcmVmcy9oZWFkcy9tYWluL2NoYS5tM3U=",
            "aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL2FidXNhZWVpZHgvQkR4VFYvcmVmcy9oZWFkcy9tYWluL2NoYW5uZWxzX3BsMi5tM3U=",
            "aHR0cHM6Ly9hcGkuYWxsb3JpZ2lucy53aW4vcmF3P3VybD0="
        ];

        const video = document.getElementById('live-tv-player');
        let hls = null;

        async function fetchPlaylist(url) {
            try {
                // Try direct, fallback to proxy
                let response = await fetch(url);
                if (!response.ok) response = await fetch(atob(_0xData[2]) + encodeURIComponent(url));
                
                const text = await response.text();
                const lines = text.split('\n');
                let channels = [];
                
                lines.forEach((line, i) => {
                    if (line.startsWith('#EXTINF:')) {
                        channels.push({
                            name: line.split(',')[1] || 'Channel',
                            url: lines[i + 1] ? lines[i + 1].trim() : ''
                        });
                    }
                });
                return channels;
            } catch (e) { return []; }
        }

        async function init() {
            let all = [];
            for(let b64 of [_0xData[0], _0xData[1]]) {
                all = [...all, ...await fetchPlaylist(atob(b64))];
            }
            render(all);
        }

        function render(channels) {
            const list = document.getElementById('channel-list');
            list.innerHTML = channels.map(c => `
                <div class="channel-item" onclick="play('${c.url}')">${c.name}</div>
            `).join('');
        }

        function play(url) {
            if (hls) hls.destroy();
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            video.play().catch(() => {});
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            document.querySelectorAll('.channel-item').forEach(el => {
                el.style.display = el.innerText.toLowerCase().includes(val) ? 'block' : 'none';
            });
        });

        init();
    </script>
</body>
</html>
