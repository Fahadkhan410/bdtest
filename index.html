<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASFA Live TV</title>
    
    <link rel="icon" type="image/png" href="https://i.postimg.cc/SRgsPFyg/image.png">
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/city/index.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #1a1a1a;
            --sidebar-bg: rgba(34, 34, 34, 0.95);
            --card-hover: #2a2a2a;
            --card-active: #333333;
            --accent-blue: #00bcd4;
            --text-main: #ffffff;
            --text-secondary: #aaaaaa;
            --border-color: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- TOP PLAYLIST NAVIGATION BAR --- */
        .playlist-filter-section {
            display: flex;
            background-color: #222;
            border-bottom: 1px solid var(--border-color);
            overflow-x: auto;
            white-space: nowrap;
            z-index: 100;
            height: 50px;
            align-items: center;
            padding: 0 10px;
        }
        .playlist-filter-section::-webkit-scrollbar { display: none; }

        .playlist-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
        }
        .playlist-btn.active, .playlist-btn:hover {
            color: var(--accent-blue);
        }

        /* --- MAIN LAYOUT STRUCTURE --- */
        .main-layout {
            display: flex;
            flex: 1;
            position: relative;
            height: calc(100vh - 50px);
            overflow: hidden;
        }

        /* SIDEBAR (LEFT CHANNELS LIST) */
        .sidebar {
            width: 360px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100%;
            z-index: 99;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .search-box-wrapper {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
        }
        .search-input {
            width: 100%;
            padding: 8px 12px;
            background-color: #111;
            border: 1px solid #444;
            color: var(--text-main);
            border-radius: 4px;
            outline: none;
        }

        .channel-list {
            flex: 1;
            overflow-y: auto;
        }
        .channel-list::-webkit-scrollbar { width: 6px; }
        .channel-list::-webkit-scrollbar-thumb { background: #444; }

        .channel-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
        }
        .channel-item:hover { background-color: var(--card-hover); }
        .channel-item.active { 
            background-color: var(--card-active);
            border: 2px solid var(--accent-blue);
        }

        .channel-index {
            font-size: 12px;
            color: var(--text-secondary);
            width: 25px;
        }
        .channel-logo {
            width: 35px;
            height: 35px;
            object-fit: contain;
            margin-right: 15px;
        }
        .channel-title {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* VIDEO PLAYER CONTAINER */
        .video-container {
            flex: 1;
            background-color: #000;
            position: relative;
            height: 100%;
        }
        .video-js {
            width: 100% !important;
            height: 100% !important;
        }

        /* --- FULL SCREEN OVERLAY OVERRIDES (AS REQUESTED) --- */
        .video-js.vjs-fullscreen .vjs-tech {
            pointer-events: auto; /* Catch clicks on the video stream directly */
        }

        body.fullscreen-mode .playlist-filter-section {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(17, 17, 17, 0.85);
            backdrop-filter: blur(10px);
        }

        body.fullscreen-mode .sidebar {
            position: absolute;
            top: 50px;
            left: 0;
            height: calc(100% - 50px);
            background: rgba(26, 26, 26, 0.85);
            backdrop-filter: blur(10px);
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }

        /* Hide layout pieces cleanly when overlay is toggled off */
        body.fullscreen-mode.hide-overlay .sidebar {
            transform: translateX(-100%);
            opacity: 0;
        }
        body.fullscreen-mode.hide-overlay .playlist-filter-section {
            transform: translateY(-100%);
            opacity: 0;
        }
    </style>
</head>
<body>

<div id="playlist-bar" class="playlist-filter-section">
    <button class="playlist-btn active" id="pl-btn-ALL" onclick="selectPlaylist('ALL')">All Playlists</button>
</div>

<div class="main-layout">
    <div class="sidebar" id="app-sidebar">
        <div class="search-box-wrapper">
            <input type="text" id="search-input" class="search-input" placeholder="Search channels..." oninput="applyFilters()">
        </div>
        <div id="channel-list" class="channel-list">
            <div style="padding:20px; color:var(--text-secondary); font-size:13px;">Loading streams...</div>
        </div>
    </div>

    <div class="video-container" id="player-zone">
        <video id="iptv-player" class="video-js vjs-theme-city" controls preload="auto">
            <p class="vjs-no-js">Enable JavaScript to run the video engine.</p>
        </video>
    </div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.js"></script>

<script>
    // Security & contextual locks
    document.addEventListener('contextmenu', e => e.preventDefault());
    setInterval(() => {
        if (window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160) {
            (function() { return false; }['constructor']('debugger')());
        }
    }, 500);

    const playlistsConfig = [
        { name: "📺Football World⚽Cup 2026", url: atob("aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL1pvb20tQWRyL3NjcmFwZXIvcmVmcy9oZWFkcy9tYWluL1Nwb3J0engubTN1OA==") },
        { name: "ASFA📺IPTV (SLOW NET)", url: atob("aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL3NyaGFkeS90YXBtYWQtYmQvcmVmcy9oZWFkcy9tYWluL3RhcG1hZF9iZC5tM3U=") },
        { name: "ASFA📺FTP (BDIX-1)", url: atob("aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL0ZhaGFka2hhbjQxMC9iZHRlc3QvcmVmcy9oZWFkcy9tYWluL2NoYS5tM3U=") },
        { name: "TOFFEE📺VOD", url: atob("aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL2tvbmFuZGEtc2cvSVBUVl9lZGlleTc1MjMwMTcvcmVmcy9oZWFkcy9tYWluL0luZGlhblZPRA==") }
    ];

    let player;
    let allChannels = [];
    let filteredChannels = [];
    let currentChannelIndex = 0;
    let currentSelectedPlaylist = "ALL";

    document.addEventListener('DOMContentLoaded', () => {
        player = videojs('iptv-player');
        
        // Track Fullscreen status to toggle layout modes
        player.on('fullscreenchange', () => {
            if (player.isFullscreen()) {
                document.body.classList.add('fullscreen-mode');
                document.body.classList.remove('hide-overlay'); // Show menu first
            } else {
                document.body.classList.remove('fullscreen-mode');
                document.body.classList.remove('hide-overlay');
            }
        });

        // Intercept click on technical video surface during full screen
        player.on('click', (e) => {
            if (player.isFullscreen()) {
                e.preventDefault();
                toggleFullscreenOverlay();
            }
        });

        fetchAllPlaylists(playlistsConfig);
    });

    // Toggle menu visibility when inside fullscreen mode
    function toggleFullscreenOverlay() {
        if (document.body.classList.contains('fullscreen-mode')) {
            document.body.classList.toggle('hide-overlay');
        }
    }

    // Dynamic keyboard handling (Navigation, Volume, and Enter/OK execution)
    document.addEventListener('keydown', event => {
        if (document.activeElement === document.getElementById('search-input')) return;

        if (event.keyCode === 123 || (event.ctrlKey && event.shiftKey && (event.keyCode === 73 || event.keyCode === 74)) || (event.ctrlKey && event.keyCode === 85)) {
            event.preventDefault();
            return false;
        }

        if (!player) return;

        // Custom UI toggle action via Enter or OK button on systems/remotes
        if (event.key === "Enter") {
            if (player.isFullscreen()) {
                event.preventDefault();
                toggleFullscreenOverlay();
                return;
            }
        }

        switch(event.key) {
            case "ArrowUp":
                event.preventDefault();
                playPreviousChannel();
                break;
            case "ArrowDown":
                event.preventDefault();
                playNextChannel();
                break;
            case "ArrowLeft":
                event.preventDefault();
                player.volume(Math.max(0, player.volume() - 0.15));
                break;
            case "ArrowRight":
                event.preventDefault();
                player.volume(Math.min(1, player.volume() + 0.15));
                break;
        }
    });

    function fetchAllPlaylists(configs) {
        const fetchPromises = configs.map(config => 
            fetch(config.url)
                .then(res => res.ok ? res.text() : '')
                .then(data => { if (data) parseM3U(data, config.name); })
                .catch(() => {})
        );

        Promise.all(fetchPromises).then(() => {
            if (allChannels.length === 0) {
                document.getElementById('channel-list').innerHTML = `<div style="padding:20px; color:red;">Channels failed to load.</div>`;
                return;
            }
            buildPlaylistFilterBar();
            applyFilters();
            if (allChannels.length > 0) playChannel(0);
        });
    }

    function parseM3U(data, playlistLabel) {
        const lines = data.split('\n');
        let currentItem = null;

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (!line) continue;

            if (line.startsWith('#EXTINF:')) {
                currentItem = { 
                    name: 'Live Stream Channel', 
                    logo: 'https://i.postimg.cc/d3Bxy9ss/sportzx-football-live-tv-hd-logo-removebg-preview.png', 
                    playlistSource: playlistLabel,
                    url: '' 
                };

                const logoMatch = line.match(/tvg-logo="([^"]+)"/i);
                if (logoMatch) currentItem.logo = logoMatch[1];

                const commaIdx = line.indexOf(',');
                if (commaIdx !== -1) currentItem.name = line.substring(commaIdx + 1).trim();
            } 
            else if (!line.startsWith('#')) {
                if (currentItem) {
                    currentItem.url = line;
                    allChannels.push(currentItem);
                    currentItem = null;
                }
            }
        }
    }

    function buildPlaylistFilterBar() {
        const bar = document.getElementById('playlist-bar');
        bar.innerHTML = '<button class="playlist-btn active" id="pl-btn-ALL" onclick="selectPlaylist(\'ALL\')">All Playlists</button>';
        
        playlistsConfig.forEach(config => {
            const btn = document.createElement('button');
            btn.className = 'playlist-btn';
            btn.id = `pl-btn-${btoa(config.name).replace(/[^a-zA-Z0-9]/g, '')}`;
            btn.textContent = config.name;
            btn.onclick = () => selectPlaylist(config.name);
            bar.appendChild(btn);
        });
    }

    function selectPlaylist(name) {
        currentSelectedPlaylist = name;
        document.querySelectorAll('.playlist-btn').forEach(btn => btn.classList.remove('active'));
        
        const targetId = name === 'ALL' ? 'pl-btn-ALL' : `pl-btn-${btoa(name).replace(/[^a-zA-Z0-9]/g, '')}`;
        const activeBtn = document.getElementById(targetId);
        if(activeBtn) activeBtn.classList.add('active');

        applyFilters();
    }

    function applyFilters() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const listContainer = document.getElementById('channel-list');
        listContainer.innerHTML = '';

        filteredChannels = allChannels.filter(channel => {
            const matchesPlaylist = (currentSelectedPlaylist === 'ALL' || channel.playlistSource === currentSelectedPlaylist);
            const matchesSearch = channel.name.toLowerCase().includes(query);
            return matchesPlaylist && matchesSearch;
        });

        filteredChannels.forEach((channel, index) => {
            const row = document.createElement('div');
            row.className = `channel-item ${index === currentChannelIndex ? 'active' : ''}`;
            row.id = `ch-item-${index}`;
            row.onclick = () => playChannel(index);

            row.innerHTML = `
                <div class="channel-index">${index + 1}</div>
                <img class="channel-logo" src="${channel.logo}" onerror="this.src='https://i.postimg.cc/d3Bxy9ss/sportzx-football-live-tv-hd-logo-removebg-preview.png'">
                <div class="channel-title">${channel.name}</div>
            `;
            listContainer.appendChild(row);
        });
    }

    function playNextChannel() {
        if (filteredChannels.length === 0) return;
        let nextIndex = currentChannelIndex + 1;
        if (nextIndex >= filteredChannels.length) nextIndex = 0;
        playChannel(nextIndex);
        scrollToActiveChannel(nextIndex);
    }

    function playPreviousChannel() {
        if (filteredChannels.length === 0) return;
        let prevIndex = currentChannelIndex - 1;
        if (prevIndex < 0) prevIndex = filteredChannels.length - 1;
        playChannel(prevIndex);
        scrollToActiveChannel(prevIndex);
    }

    function scrollToActiveChannel(index) {
        const element = document.getElementById(`ch-item-${index}`);
        if (element) element.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function playChannel(index) {
        if (filteredChannels.length === 0) return;
        const channel = filteredChannels[index];
        if (!channel) return;

        currentChannelIndex = index;

        document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
        const activeRow = document.getElementById(`ch-item-${index}`);
        if(activeRow) activeRow.classList.add('active');

        let type = 'application/x-mpegURL'; 
        if (channel.url.toLowerCase().includes('.mpd')) {
            type = 'application/dash+xml';
        } else if (channel.url.toLowerCase().includes('.mp4')) {
            type = 'video/mp4';
        }

        player.src({ src: channel.url, type: type });
        player.ready(() => {
            player.play().catch(() => {});
        });
    }
</script>
</body>
</html>
