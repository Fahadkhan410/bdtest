<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASFA Live TV</title>
    
    <link rel="icon" type="image/png" href="https://i.postimg.cc/SRgsPFyg/image.png">
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/city/index.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0c0c0e;
            --sidebar-bg: #121214;
            --card-hover: #1c1c21;
            --accent-blue: #0078d4;
            --accent-green: #28a745;
            --text-main: #ffffff;
            --text-secondary: #aaaaaa;
            --border-color: #222226;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* Prevents users from highlighting text/elements easily */
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .main-layout {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        .video-container {
            flex: 1;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            position: relative;
        }

        .video-js {
            width: 100% !important;
            height: 100% !important;
        }

        .player-nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            opacity: 0.3;
        }

        .video-container:hover .player-nav-btn {
            opacity: 1;
        }

        .player-nav-btn:hover {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            transform: translateY(-50%) scale(1.1);
        }

        .player-nav-btn.prev-btn { left: 20px; }
        .player-nav-btn.next-btn { right: 20px; }

        .sidebar {
            width: 380px;
            background-color: var(--sidebar-bg);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .search-box-wrapper {
            padding: 15px 15px 10px 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .search-input {
            width: 100%;
            padding: 10px 14px;
            background-color: #1a1a1e;
            border: 1px solid #33333a;
            color: var(--text-main);
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        .search-input:focus { border-color: var(--accent-blue); }

        .playlist-filter-section {
            padding: 12px 15px;
            background-color: #101012;
            border-bottom: 1px solid var(--border-color);
        }
        
        .section-label {
            font-size: 11px;
            text-transform: uppercase;
            color: #55555d;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .playlist-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .playlist-btn {
            background-color: #1c1c21;
            color: #fff;
            border: 1px solid #2d2d35;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: normal; 
            text-align: left;
        }
        
        .playlist-btn.active {
            background-color: var(--accent-green);
            border-color: var(--accent-green);
        }

        .group-filter-section {
            padding: 12px 15px;
            background-color: #151518;
            border-bottom: 1px solid var(--border-color);
        }

        .group-filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-height: 120px;
            overflow-y: auto;
        }

        .group-btn {
            background-color: #222226;
            color: var(--text-secondary);
            border: none;
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .group-btn.active, .group-btn:hover {
            background-color: var(--accent-blue);
            color: var(--text-main);
        }

        .channel-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }
        
        .channel-list::-webkit-scrollbar { width: 6px; }
        .channel-list::-webkit-scrollbar-thumb { background: #2a2a30; border-radius: 3px; }

        .channel-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid #18181c;
            transition: background 0.15s ease;
        }
        
        .channel-item:hover, .channel-item.active { background-color: var(--card-hover); }
        .channel-item.active { border-left: 4px solid var(--accent-blue); padding-left: 16px; }

        .channel-logo {
            width: 40px;
            height: 40px;
            object-fit: contain;
            background-color: #1a1a1e;
            border-radius: 50%;
            margin-right: 15px;
            border: 1px solid #222226;
        }

        .channel-info { flex: 1; overflow: hidden; }
        .channel-title { font-size: 14px; font-weight: 500; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .channel-meta-tags { display: flex; gap: 6px; margin-top: 4px; }
        .tag { font-size: 10px; padding: 2px 6px; border-radius: 3px; background: #222226; color: var(--text-secondary); }
        .tag.src-tag { background-color: #193421; color: #8ad39e; }

        .footer-note { padding: 10px; text-align: center; font-size: 11px; color: #55555d; border-top: 1px solid var(--border-color); background-color: #0e0e10; }

        /* --- RESPONSIVE MEDIA QUERIES --- */
        @media (max-width: 992px) {
            body {
                overflow-y: auto;
                height: auto;
            }
            .main-layout {
                flex-direction: column;
                height: auto;
                width: 100%;
            }
            .video-container {
                flex: none;
                width: 100%;
                aspect-ratio: 16 / 9;
                height: auto;
            }
            .sidebar {
                width: 100%;
                border-left: none;
                border-top: 1px solid var(--border-color);
                height: calc(100vh - 56.25vw); /* Calculates viewport space left after 16:9 video */
                min-height: 450px;
            }
            .player-nav-btn {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }
            .player-nav-btn.prev-btn { left: 10px; }
            .player-nav-btn.next-btn { right: 10px; }
        }
    </style>
</head>
<body>

<div class="main-layout">
    
    <div class="video-container">
        <button class="player-nav-btn prev-btn" onclick="playPreviousChannel()">&#10094;</button>
        <button class="player-nav-btn next-btn" onclick="playNextChannel()">&#10095;</button>

        <video id="iptv-player" class="video-js vjs-theme-city" controls preload="auto">
            <p class="vjs-no-js">Enable JavaScript to load live streams correctly.</p>
        </video>
    </div>

    <div class="sidebar">
        <div class="search-box-wrapper">
            <input type="text" id="search-input" class="search-input" placeholder="Search across all channels & VOD..." oninput="applyFilters()">
        </div>

        <div class="playlist-filter-section">
            <div class="section-label">Select M3U Playlist File</div>
            <div id="playlist-bar" class="playlist-bar">
                <button class="playlist-btn active" id="pl-btn-ALL" onclick="selectPlaylist('ALL')">All Playlists</button>
            </div>
        </div>

        <div class="group-filter-section">
            <div class="section-label">Filter by Group Category</div>
            <div id="group-bar" class="group-filter-bar">
                <button class="group-btn active" onclick="selectGroup('ALL')">All Groups</button>
            </div>
        </div>

        <div id="channel-list" class="channel-list">
            <div style="padding:20px; color:var(--text-secondary); font-size:13px;">Syncing server playlists...</div>
        </div>

        <div class="footer-note">for more updates</div>
    </div>

</div>

<script src="https://vjs.zencdn.net/8.10.0/video.js"></script>

<script>
    // --- UI PROTECTION CONTROLS ---
    
    // Disable right click context menu
    document.addEventListener('contextmenu', event => event.preventDefault());

    // Disable keyboard shortcuts used to open inspector tools
    document.addEventListener('keydown', event => {
        if (
            event.keyCode === 123 || // F12 key
            (event.ctrlKey && event.shiftKey && event.keyCode === 73) || // Ctrl+Shift+I
            (event.ctrlKey && event.shiftKey && event.keyCode === 74) || // Ctrl+Shift+J
            (event.ctrlKey && event.keyCode === 85) // Ctrl+U (View Source)
        ) {
            event.preventDefault();
            return false;
        }
    });

    // Anti-debugging loop: Pauses execution if DevTools is opened
    setInterval(function() {
        if (window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160) {
            // Evaluates a debugger anchor to stall page behavior when console is open
            (function() { return false; }['constructor']('debugger')());
        }
    }, 500);


    // --- PLAYLIST CONFIGURATION (OBLITERATED VIA BASE64) ---
    // The URLs are converted back to real addresses in memory during runtime
    const playlistsConfig = [
        { name: "Live-Tapmad", url: atob("aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL3NyaGFkeS90YXBtYWQtYmQvcmVmcy9oZWFkcy9tYWluL3RhcG1hZF9iZC5tM3U=") },
        { name: "Free-Live TV", url: atob("aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL0ZhaGFka2hhbjQxMC9iZHRlc3QvcmVmcy9oZWFkcy9tYWluL2NoYS5tM3U=") },
        { name: "Live-FIFA 2026", url: atob("aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL1pvb20tQWRyL3NjcmFwZXIvcmVmcy9oZWFkcy9tYWluL1Nwb3J0engubTN1OA==") },
        { name: "Movies-VOD", url: atob("aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL2tvbmFuZGEtc2cvSVBUVl9lZGlleTc1MjMwMTcvcmVmcy9oZWFkcy9tYWluL0luZGlhblZPRA==") }
    ];

    let player;
    let allChannels = [];
    let currentChannelIndex = 0;
    let currentSelectedPlaylist = "ALL";
    let currentSelectedGroup = "ALL";

    document.addEventListener('DOMContentLoaded', () => {
        player = videojs('iptv-player');
        fetchAllPlaylists(playlistsConfig);
    });

    function fetchAllPlaylists(configs) {
        const fetchPromises = configs.map(config => 
            fetch(config.url)
                .then(res => res.ok ? res.text() : '')
                .then(data => {
                    if (data) parseM3U(data, config.name);
                })
                .catch(err => console.error('Data pipeline exception protected.'))
        );

        Promise.all(fetchPromises).then(() => {
            if (allChannels.length === 0) {
                document.getElementById('channel-list').innerHTML = `<div style="padding:20px; color:#ff4444; font-size:13px;">Failed to initialize resources.</div>`;
                return;
            }
            
            buildPlaylistFilterBar();
            buildGroupFilterBar();
            applyFilters();
            
            if (allChannels.length > 0) playChannel(0);
        });
    }

    function parseM3U(data, playlistLabel) {
        const lines = data.split('\n');
        let currentItem = null;

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (!line) continue;

            if (line.startsWith('#EXTINF:')) {
                currentItem = { 
                    name: 'Live Stream Channel', 
                    logo: 'https://i.postimg.cc/d3Bxy9ss/sportzx-football-live-tv-hd-logo-removebg-preview.png', 
                    group: 'Uncategorized', 
                    playlistSource: playlistLabel,
                    url: '', 
                    drmKey: null 
                };

                const logoMatch = line.match(/tvg-logo="([^"]+)"/i);
                if (logoMatch) currentItem.logo = logoMatch[1];

                const groupMatch = line.match(/group-title="([^"]+)"/i);
                if (groupMatch) currentItem.group = groupMatch[1];

                const commaIdx = line.indexOf(',');
                if (commaIdx !== -1) currentItem.name = line.substring(commaIdx + 1).trim();
            } 
            else if (line.startsWith('#KODIPROP:inputstream.adaptive.license_key=')) {
                if (currentItem) currentItem.drmKey = line.split('=')[1].trim();
            } 
            else if (!line.startsWith('#')) {
                if (currentItem) {
                    currentItem.url = line;
                    allChannels.push(currentItem);
                    currentItem = null;
                }
            }
        }
    }

    function buildPlaylistFilterBar() {
        const bar = document.getElementById('playlist-bar');
        bar.innerHTML = '<button class="playlist-btn active" id="pl-btn-ALL" onclick="selectPlaylist(\'ALL\')">All Playlists</button>';
        
        playlistsConfig.forEach(config => {
            const btn = document.createElement('button');
            btn.className = 'playlist-btn';
            btn.id = `pl-btn-${config.name.replace(/\s+/g, '')}`;
            btn.textContent = config.name;
            btn.onclick = () => selectPlaylist(config.name);
            bar.appendChild(btn);
        });
    }

    function buildGroupFilterBar() {
        const groupBar = document.getElementById('group-bar');
        
        const filteredChannels = currentSelectedPlaylist === 'ALL' 
            ? allChannels 
            : allChannels.filter(ch => ch.playlistSource === currentSelectedPlaylist);

        const categories = ['ALL', ...new Set(filteredChannels.map(ch => ch.group))];
        
        groupBar.innerHTML = '';
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = `group-btn ${cat === currentSelectedGroup ? 'active' : ''}`;
            btn.textContent = cat;
            btn.onclick = () => selectGroup(cat, btn);
            groupBar.appendChild(btn);
        });
    }

    function selectPlaylist(name) {
        currentSelectedPlaylist = name;
        currentSelectedGroup = "ALL"; 
        
        document.querySelectorAll('.playlist-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.getElementById(`pl-btn-${name.replace(/\s+/g, '')}`);
        if(activeBtn) activeBtn.classList.add('active');

        buildGroupFilterBar();
        applyFilters();
    }

    function selectGroup(groupName, activeBtn) {
        currentSelectedGroup = groupName;
        document.querySelectorAll('.group-filter-bar .group-btn').forEach(btn => btn.classList.remove('active'));
        if(activeBtn) activeBtn.classList.add('active');
        applyFilters();
    }

    function applyFilters() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const listContainer = document.getElementById('channel-list');
        listContainer.innerHTML = '';

        allChannels.forEach((channel, originalIndex) => {
            const matchesPlaylist = (currentSelectedPlaylist === 'ALL' || channel.playlistSource === currentSelectedPlaylist);
            const matchesGroup = (currentSelectedGroup === 'ALL' || channel.group === currentSelectedGroup);
            const matchesSearch = channel.name.toLowerCase().includes(query);

            if (matchesPlaylist && matchesGroup && matchesSearch) {
                const row = document.createElement('div');
                row.className = `channel-item`;
                row.id = `ch-item-${originalIndex}`;
                row.onclick = () => playChannel(originalIndex);

                row.innerHTML = `
                    <img class="channel-logo" src="${channel.logo}" onerror="this.src='https://i.postimg.cc/d3Bxy9ss/sportzx-football-live-tv-hd-logo-removebg-preview.png'">
                    <div class="channel-info">
                        <div class="channel-title">${channel.name}</div>
                        <div class="channel-meta-tags">
                            <span class="tag src-tag">${channel.playlistSource}</span>
                            <span class="tag">${channel.group}</span>
                        </div>
                    </div>
                `;
                listContainer.appendChild(row);
            }
        });
    }

    function playNextChannel() {
        if (allChannels.length === 0) return;
        let nextIndex = currentChannelIndex + 1;
        if (nextIndex >= allChannels.length) nextIndex = 0;
        playChannel(nextIndex);
        scrollToActiveChannel(nextIndex);
    }

    // Handles the previous skip trigger behavior
    function playPreviousChannel() {
        if (allChannels.length === 0) return;
        let prevIndex = currentChannelIndex - 1;
        if (prevIndex < 0) prevIndex = allChannels.length - 1;
        playChannel(prevIndex);
        scrollToActiveChannel(prevIndex);
    }

    function scrollToActiveChannel(index) {
        const element = document.getElementById(`ch-item-${index}`);
        if (element) {
            element.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    }

    function playChannel(index) {
        const channel = allChannels[index];
        if (!channel) return;

        currentChannelIndex = index;

        document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
        const activeRow = document.getElementById(`ch-item-${index}`);
        if(activeRow) activeRow.classList.add('active');

        let type = 'application/x-mpegURL'; 
        let src = channel.url;
        let keySystems = {};

        const cleanUrl = src.toLowerCase().split('?')[0]; 

        if (cleanUrl.includes('.mpd')) {
            type = 'application/dash+xml';
            
            if (channel.drmKey && channel.drmKey.includes(':')) {
                const parts = channel.drmKey.split(':');
                const kid = btoa(String.fromCharCode(...parts[0].match(/../g).map(h => parseInt(h, 16)))).replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');
                const key = btoa(String.fromCharCode(...parts[1].match(/../g).map(h => parseInt(h, 16)))).replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');
                
                keySystems = {
                    'org.w3.clearkey': { 'clearkey': { [kid]: key } }
                };
            }
        } 
        else if (cleanUrl.includes('.mp4')) { type = 'video/mp4'; } 
        else if (cleanUrl.includes('.mkv')) { type = 'video/x-matroska'; } 
        else if (cleanUrl.includes('.webm')) { type = 'video/webm'; } 
        else if (cleanUrl.includes('.ogv') || cleanUrl.includes('.ogg')) { type = 'video/ogg'; } 
        else if (cleanUrl.includes('.mov') || cleanUrl.includes('.avi')) { type = 'video/mp4'; }

        player.src({ src: src, type: type, keySystems: keySystems });
        player.ready(() => {
            player.play().catch(e => console.log('Autoplay deferred.'));
        });
    }
</script>
</body>
</html>
