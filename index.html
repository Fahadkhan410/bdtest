<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASFA Live TV</title>
    
    <link rel="icon" type="image/png" href="https://i.postimg.cc/SRgsPFyg/image.png">
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/city/index.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0c0c0e;
            --sidebar-bg: rgba(18, 18, 20, 0.85); /* Semi-transparent like the screenshot */
            --card-hover: rgba(28, 28, 33, 0.9);
            --accent-blue: #0078d4;
            --accent-green: #28a745;
            --text-main: #ffffff;
            --text-secondary: #aaaaaa;
            --border-color: rgba(34, 34, 38, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .main-layout {
            display: flex;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* --- VIDEO CONTAINER & FULLSCREEN OVERLAY MANAGEMENT --- */
        .video-container {
            flex: 1;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            position: relative;
        }

        .video-js {
            width: 100% !important;
            height: 100% !important;
            z-index: 1;
        }

        /* --- THE NEW PREMIUM OVERLAYS FOR PC & MOBILE --- */
        
        /* Top Navigation Bar (Playlists Selection) */
        .top-nav-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 100%);
            z-index: 10;
            display: flex;
            align-items: center;
            padding: 0 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        /* Side Channel List Overlay */
        .sidebar-overlay {
            position: absolute;
            top: 60px;
            left: 0;
            bottom: 0;
            width: 380px;
            background-color: var(--sidebar-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 10;
            opacity: 0;
            transform: translateX(-20px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
        }

        /* Trigger overlay view on Video Hover or Active UI interaction */
        .video-container:hover .top-nav-overlay,
        .video-container:hover .sidebar-overlay,
        .video-container.show-ui .top-nav-overlay,
        .video-container.show-ui .sidebar-overlay {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        /* Playlist Top Horizontal Bar */
        .playlist-bar {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            white-space: nowrap;
            width: 100%;
            padding: 10px 0;
        }
        .playlist-bar::-webkit-scrollbar { display: none; }
        
        .playlist-btn {
            background: none;
            color: var(--text-secondary);
            border: none;
            padding: 8px 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s, border-bottom 0.2s;
            border-bottom: 3px solid transparent;
        }
        
        .playlist-btn.active, .playlist-btn:hover {
            color: var(--text-main);
            border-bottom: 3px solid var(--accent-blue);
        }

        /* Sidebar Elements */
        .search-box-wrapper {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .search-input {
            width: 100%;
            padding: 12px;
            background-color: rgba(26, 26, 30, 0.8);
            border: 1px solid #33333a;
            color: var(--text-main);
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }
        .search-input:focus { border-color: var(--accent-blue); }

        .group-filter-section {
            padding: 10px 15px;
            border-bottom: 1px solid var(--border-color);
        }
        .group-filter-bar {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        .group-filter-bar::-webkit-scrollbar { height: 4px; }
        .group-filter-bar::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        .group-btn {
            background-color: rgba(34, 34, 38, 0.6);
            color: var(--text-secondary);
            border: none;
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .group-btn.active, .group-btn:hover {
            background-color: var(--accent-blue);
            color: #fff;
        }

        /* Channels Rows Styling */
        .channel-list {
            flex: 1;
            overflow-y: auto;
        }
        .channel-list::-webkit-scrollbar { width: 6px; }
        .channel-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

        .channel-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            transition: background 0.15s ease;
            position: relative;
        }
        .channel-item:hover { background-color: var(--card-hover); }
        
        /* The requested Highlight Border Rule style matching the provided image marker */
        .channel-item.active { 
            background-color: rgba(0, 120, 212, 0.15);
            border: 1.5px solid var(--accent-blue);
        }

        .channel-index {
            font-size: 13px;
            color: var(--text-secondary);
            width: 25px;
            font-weight: bold;
        }

        .channel-logo {
            width: 36px;
            height: 36px;
            object-fit: contain;
            background-color: #1a1a1e;
            border-radius: 4px;
            margin-right: 15px;
        }

        .channel-info { flex: 1; overflow: hidden; }
        .channel-title { font-size: 15px; font-weight: 500; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Navigation arrow buttons */
        .player-nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            z-index: 11;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            opacity: 0;
            pointer-events: none;
        }
        .video-container:hover .player-nav-btn,
        .video-container.show-ui .player-nav-btn { opacity: 0.6; pointer-events: auto; }
        .player-nav-btn:hover { opacity: 1 !important; background: var(--accent-blue); }
        .player-nav-btn.prev-btn { left: 400px; } /* Placed next to overlay container */
        .player-nav-btn.next-btn { right: 20px; }

        /* Responsive Media Adjustments */
        @media (max-width: 768px) {
            .sidebar-overlay {
                width: 280px;
            }
            .player-nav-btn.prev-btn { left: 290px; }
            .playlist-btn { font-size: 12px; }
            .channel-title { font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="main-layout">
    
    <div class="video-container" id="video-wrapper" onclick="toggleMobileUI()">
        <button class="player-nav-btn prev-btn" onclick="event.stopPropagation(); playPreviousChannel()">&#10094;</button>
        <button class="player-nav-btn next-btn" onclick="event.stopPropagation(); playNextChannel()">&#10095;</button>

        <div class="top-nav-overlay" onclick="event.stopPropagation();">
            <div id="playlist-bar" class="playlist-bar">
                <button class="playlist-btn active" id="pl-btn-ALL" onclick="selectPlaylist('ALL')">📺 All Networks</button>
            </div>
        </div>

        <div class="sidebar-overlay" onclick="event.stopPropagation();">
            <div class="search-box-wrapper">
                <input type="text" id="search-input" class="search-input" placeholder="Search Channels..." oninput="applyFilters()">
            </div>

            <div class="group-filter-section">
                <div id="group-bar" class="group-filter-bar">
                    <button class="group-btn active" onclick="selectGroup('ALL')">All Groups</button>
                </div>
            </div>

            <div id="channel-list" class="channel-list">
                </div>
        </div>

        <video id="iptv-player" class="video-js vjs-theme-city" controls preload="auto">
            <p class="vjs-no-js">Enable JavaScript to load live streams correctly.</p>
        </video>
    </div>

</div>

<script src="https://vjs.zencdn.net/8.10.0/video.js"></script>

<script>
    // --- UI LIFECYCLE MANAGEMENT FOR MOBILE TAP EVENTS ---
    let uiTimeout;
    function toggleMobileUI() {
        const wrapper = document.getElementById('video-wrapper');
        if (wrapper.classList.contains('show-ui')) {
            wrapper.classList.remove('show-ui');
        } else {
            wrapper.classList.add('show-ui');
            clearTimeout(uiTimeout);
            uiTimeout = setTimeout(() => {
                wrapper.classList.remove('show-ui');
            }, 5000); // UI collapses automatically after 5 seconds of inactivity
        }
    }

    // Context Security Blocks
    document.addEventListener('contextmenu', event => event.preventDefault());
    setInterval(function() {
        if (window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160) {
            (function() { return false; }['constructor']('debugger')());
        }
    }, 500);

    // Global Key Events Management Interface
    document.addEventListener('keydown', event => {
        if (document.activeElement === document.getElementById('search-input')) return;

        if (event.keyCode === 123 || (event.ctrlKey && event.shiftKey && (event.keyCode === 73 || event.keyCode === 74)) || (event.ctrlKey && event.keyCode === 85)) {
            event.preventDefault();
            return false;
        }

        if (player) {
            switch(event.key) {
                case "ArrowUp":
                    event.preventDefault();
                    playPreviousChannel();
                    break;
                case "ArrowDown":
                    event.preventDefault();
                    playNextChannel();
                    break;
                case "ArrowLeft":
                    event.preventDefault();
                    let currentVolDown = player.volume();
                    player.volume(Math.max(0, currentVolDown - 0.15)); // Custom 15% delta steps
                    break;
                case "ArrowRight":
                    event.preventDefault();
                    let currentVolUp = player.volume();
                    player.volume(Math.min(1, currentVolUp + 0.15));
                    break;
            }
        }
    });

    // Configuration Strings
    const playlistsConfig = [
        { name: "Football World🏆Cup 2026", url: atob("aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL1pvb20tQWRyL3NjcmFwZXIvcmVmcy9oZWFkcy9tYWluL1Nwb3J0engubTN1OA==") },
        { name: "ASFA📺IPTV (SLOW NET)", url: atob("aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL3NyaGFkeS90YXBtYWQtYmQvcmVmcy9oZWFkcy9tYWluL3RhcG1hZF9iZC5tM3U=") },
        { name: "ASFA📺FTP (BDIX-1)", url: atob("aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL0ZhaGFka2hhbjQxMC9iZHRlc3QvcmVmcy9oZWFkcy9tYWluL2NoYS5tM3U=") },
        { name: "TOFFEE📺M3U", url: atob("aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL2tvbmFuZGEtc2cvSVBUVl9lZGlleTc1MjMwMTcvcmVmcy9oZWFkcy9tYWluL0luZGlhblZPRA==") }
    ];

    let player;
    let allChannels = [];
    let currentChannelIndex = 0;
    let currentSelectedPlaylist = "ALL";
    let currentSelectedGroup = "ALL";

    document.addEventListener('DOMContentLoaded', () => {
        player = videojs('iptv-player');
        fetchAllPlaylists(playlistsConfig);
    });

    function fetchAllPlaylists(configs) {
        const fetchPromises = configs.map(config => 
            fetch(config.url)
                .then(res => res.ok ? res.text() : '')
                .then(data => { if (data) parseM3U(data, config.name); })
                .catch(err => console.error('Secure initialization pipeline executed.'))
        );

        Promise.all(fetchPromises).then(() => {
            if (allChannels.length === 0) {
                document.getElementById('channel-list').innerHTML = `<div style="padding:20px; color:#ff4444;">Failed to sync lists.</div>`;
                return;
            }
            buildPlaylistFilterBar();
            buildGroupFilterBar();
            applyFilters();
            if (allChannels.length > 0) playChannel(0);
        });
    }

    function parseM3U(data, playlistLabel) {
        const lines = data.split('\n');
        let currentItem = null;

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (!line) continue;

            if (line.startsWith('#EXTINF:')) {
                currentItem = { 
                    name: 'Live Channel', 
                    logo: 'https://i.postimg.cc/d3Bxy9ss/sportzx-football-live-tv-hd-logo-removebg-preview.png', 
                    group: 'Uncategorized', 
                    playlistSource: playlistLabel,
                    url: '', 
                    drmKey: null 
                };

                const logoMatch = line.match(/tvg-logo="([^"]+)"/i);
                if (logoMatch) currentItem.logo = logoMatch[1];

                const groupMatch = line.match(/group-title="([^"]+)"/i);
                if (groupMatch) currentItem.group = groupMatch[1];

                const commaIdx = line.indexOf(',');
                if (commaIdx !== -1) currentItem.name = line.substring(commaIdx + 1).trim();
            } 
            else if (line.startsWith('#KODIPROP:inputstream.adaptive.license_key=')) {
                if (currentItem) currentItem.drmKey = line.split('=')[1].trim();
            } 
            else if (!line.startsWith('#')) {
                if (currentItem) {
                    currentItem.url = line;
                    allChannels.push(currentItem);
                    currentItem = null;
                }
            }
        }
    }

    function buildPlaylistFilterBar() {
        const bar = document.getElementById('playlist-bar');
        bar.innerHTML = '<button class="playlist-btn active" id="pl-btn-ALL" onclick="selectPlaylist(\'ALL\')">🌐 All Networks</button>';
        
        playlistsConfig.forEach(config => {
            const btn = document.createElement('button');
            btn.className = 'playlist-btn';
            btn.id = `pl-btn-${config.name.replace(/\s+/g, '')}`;
            btn.textContent = config.name;
            btn.onclick = () => selectPlaylist(config.name);
            bar.appendChild(btn);
        });
    }

    function buildGroupFilterBar() {
        const groupBar = document.getElementById('group-bar');
        const filteredChannels = currentSelectedPlaylist === 'ALL' ? allChannels : allChannels.filter(ch => ch.playlistSource === currentSelectedPlaylist);
        const categories = ['ALL', ...new Set(filteredChannels.map(ch => ch.group))];
        
        groupBar.innerHTML = '';
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = `group-btn ${cat === currentSelectedGroup ? 'active' : ''}`;
            btn.textContent = cat;
            btn.onclick = () => selectGroup(cat, btn);
            groupBar.appendChild(btn);
        });
    }

    function selectPlaylist(name) {
        currentSelectedPlaylist = name;
        currentSelectedGroup = "ALL"; 
        document.querySelectorAll('.playlist-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.getElementById(`pl-btn-${name.replace(/\s+/g, '')}`);
        if(activeBtn) activeBtn.classList.add('active');
        buildGroupFilterBar();
        applyFilters();
    }

    function selectGroup(groupName, activeBtn) {
        currentSelectedGroup = groupName;
        document.querySelectorAll('.group-filter-bar .group-btn').forEach(btn => btn.classList.remove('active'));
        if(activeBtn) activeBtn.classList.add('active');
        applyFilters();
    }

    function applyFilters() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const listContainer = document.getElementById('channel-list');
        listContainer.innerHTML = '';

        let displayedIndex = 1;
        allChannels.forEach((channel, originalIndex) => {
            const matchesPlaylist = (currentSelectedPlaylist === 'ALL' || channel.playlistSource === currentSelectedPlaylist);
            const matchesGroup = (currentSelectedGroup === 'ALL' || channel.group === currentSelectedGroup);
            const matchesSearch = channel.name.toLowerCase().includes(query);

            if (matchesPlaylist && matchesGroup && matchesSearch) {
                const row = document.createElement('div');
                row.className = `channel-item ${originalIndex === currentChannelIndex ? 'active' : ''}`;
                row.id = `ch-item-${originalIndex}`;
                row.onclick = () => playChannel(originalIndex);

                row.innerHTML = `
                    <div class="channel-index">${displayedIndex++}</div>
                    <img class="channel-logo" src="${channel.logo}" onerror="this.src='https://i.postimg.cc/d3Bxy9ss/sportzx-football-live-tv-hd-logo-removebg-preview.png'">
                    <div class="channel-info">
                        <div class="channel-title">${channel.name}</div>
                    </div>
                `;
                listContainer.appendChild(row);
            }
        });
    }

    function playNextChannel() {
        if (allChannels.length === 0) return;
        let nextIndex = currentChannelIndex + 1;
        if (nextIndex >= allChannels.length) nextIndex = 0;
        playChannel(nextIndex);
        scrollToActiveChannel(nextIndex);
    }

    function playPreviousChannel() {
        if (allChannels.length === 0) return;
        let prevIndex = currentChannelIndex - 1;
        if (prevIndex < 0) prevIndex = allChannels.length - 1;
        playChannel(prevIndex);
        scrollToActiveChannel(prevIndex);
    }

    function scrollToActiveChannel(index) {
        const element = document.getElementById(`ch-item-${index}`);
        if (element) element.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function playChannel(index) {
        const channel = allChannels[index];
        if (!channel) return;

        currentChannelIndex = index;
        document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
        const activeRow = document.getElementById(`ch-item-${index}`);
        if(activeRow) activeRow.classList.add('active');

        let type = 'application/x-mpegURL'; 
        let src = channel.url;
        let keySystems = {};
        const cleanUrl = src.toLowerCase().split('?')[0]; 

        if (cleanUrl.includes('.mpd')) {
            type = 'application/dash+xml';
            if (channel.drmKey && channel.drmKey.includes(':')) {
                const parts = channel.drmKey.split(':');
                const kid = btoa(String.fromCharCode(...parts[0].match(/../g).map(h => parseInt(h, 16)))).replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');
                const key = btoa(String.fromCharCode(...parts[1].match(/../g).map(h => parseInt(h, 16)))).replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');
                keySystems = { 'org.w3.clearkey': { 'clearkey': { [kid]: key } } };
            }
        } 
        else if (cleanUrl.includes('.mp4')) { type = 'video/mp4'; } 
        else if (cleanUrl.includes('.mkv')) { type = 'video/x-matroska'; }

        player.src({ src: src, type: type, keySystems: keySystems });
        player.ready(() => {
            player.play().catch(e => console.log('Playback state initialized.'));
        });
    }
</script>
</body>
</html>
