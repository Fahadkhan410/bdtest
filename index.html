<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASFA Live Premium - fMP4 Enhanced</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/SRgsPFyg/image.png">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #000000; color: #fff; min-height: 100vh; overflow: hidden; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
        .container { height: 100vh; display: flex; flex-direction: column; }
        .content-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        #player-container { width: 100%; background: #000; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #live-tv-player { width: 100%; height: 100%; background: #000; object-fit: contain; }
        
        .player-controls { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.85)); padding: 20px; display: flex; align-items: center; justify-content: space-between; opacity: 0; transition: opacity 0.3s; z-index: 5; }
        #player-container:hover .player-controls { opacity: 1; }
        .control-group { display: flex; align-items: center; gap: 15px; }
        .control-btn { background: none; border: none; color: white; font-size: 22px; cursor: pointer; transition: color 0.2s; display: flex; align-items: center; }
        .control-btn:hover { color: #ff3333; }
        
        .live-badge { background: #ff0000; color: white; font-size: 11px; font-weight: bold; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 5px; }
        .live-badge::before { content: ''; display: inline-block; width: 6px; height: 6px; background: white; border-radius: 50%; animation: pulse 1s infinite; }
        .volume-container { display: flex; align-items: center; gap: 8px; }
        .volume-slider { width: 70px; height: 4px; accent-color: #ff3333; cursor: pointer; }
        
        .spinner { position: absolute; width: 50px; height: 50px; border: 3px solid rgba(255,255,255,0.1); border-radius: 50%; border-top-color: #ff3333; animation: spin 1s ease-in-out infinite; display: none; z-index: 4; }
        .toast { position: absolute; top: 20px; left: 20px; background: rgba(255, 51, 51, 0.9); padding: 10px 15px; border-radius: 6px; font-size: 13px; display: flex; align-items: center; gap: 8px; transform: translateY(-100px); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 6; }
        .toast.show { transform: translateY(0); }

        .channel-section { background-image: url('https://i.postimg.cc/SRgsPFyg/image.png'); background-size: cover; background-position: center; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .search-bar { padding: 10px; background: rgba(0, 0, 0, 0.9); position: sticky; top: 0; z-index: 10; }
        .search-bar input { width: 100%; padding: 12px; border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 8px; outline: none; background: rgba(255, 255, 255, 0.1); color: #ffffff; font-size: 16px; }
        .channel-list { flex: 1; overflow-y: auto; background: rgba(0, 0, 0, 0.8); }
        .channel-item { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer; transition: background 0.2s; }
        .channel-item:hover { background: rgba(255, 255, 255, 0.1); }
        .channel-item img { width: 40px; height: 40px; margin-right: 15px; border-radius: 8px; object-fit: cover; }
        .channel-item span { color: #fff; font-size: 15px; }
        .footer { padding: 10px; text-align: center; background: rgba(0, 0, 0, 0.9); }
        .footer a { color: #ffffff; text-decoration: none; font-size: 14px; }
        .channel-list::-webkit-scrollbar { width: 6px; }
        .channel-list::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.3); }
        .channel-list::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 3px; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        @media (min-width: 768px) { .content-wrapper { flex-direction: row; } #player-container { flex: 0 0 70%; height: 100vh; } .channel-section { width: 30%; min-width: 30%; } }
        @media (max-width: 767px) { body { overflow: auto; } .container { height: auto; } #player-container { height: 35vh; } .channel-section { height: 65vh; } .channel-list { max-height: calc(65vh - 110px); } .player-controls { opacity: 1; padding: 10px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="content-wrapper">
            <div id="player-container">
                <div class="spinner" id="player-spinner"></div>
                <div class="toast" id="player-toast"><i class="ri-alert-line"></i> <span id="toast-msg">Error</span></div>
                
                <video id="live-tv-player" preload="auto" playsinline></video>

                <div class="player-controls">
                    <div class="control-group">
                        <button class="control-btn" id="play-btn" onclick="togglePlay()"><i class="ri-play-fill"></i></button>
                        <div class="volume-container">
                            <button class="control-btn" id="mute-btn" onclick="toggleMute()"><i class="ri-volume-up-fill"></i></button>
                            <input type="range" class="volume-slider" id="volume-range" min="0" max="1" step="0.1" value="1" oninput="setVolume(this.value)">
                        </div>
                    </div>
                    <div class="control-group">
                        <div class="live-badge">Live</div>
                        <button class="control-btn" onclick="toggleFullscreen()"><i class="ri-fullscreen-line"></i></button>
                    </div>
                </div>
            </div>

            <div class="channel-section">
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="Search channels...">
                </div>
                <div class="channel-list" id="channel-list"></div>
                <div class="footer">
                    <a href="updates.html" target="_blank">for more updates</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('keydown', e => {
                if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || (e.ctrlKey && e.key === 'u')) {
                    e.preventDefault();
                    return false;
                }
            });
        })();

        let player = document.getElementById('live-tv-player');
        let spinner = document.getElementById('player-spinner');
        let playBtn = document.getElementById('play-btn');
        let muteBtn = document.getElementById('mute-btn');
        let volumeRange = document.getElementById('volume-range');
        let currentHls = null;
        const DEFAULT_LOGO = 'https://images.unsplash.com/photo-1595624871930-6e8537998592?w=100&auto=format&fit=crop&q=60';
        let allChannels = [];

        const _0x4f2a = [
            "aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL0ZhaGFka2hhbjQxMC9iZHRlc3QvcmVmcy9oZWFkcy9tYWluL2NoYS5tM3U=",
            "aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL2FidXNhZWVpZHgvQkR4VFYvcmVmcy9oZWFkcy9tYWluL2NoYW5uZWxzX3BsMi5tM3U=",
            "aHR0cHM6Ly9hcGkuYWxsb3JpZ2lucy53aW4vcmF3P3VybD0=" 
        ];

        const PLAYLIST_URLS = [atob(_0x4f2a[0]), atob(_0x4f2a[1])];

        window.onload = () => {
            loadAllPlaylists();
            adjustPlayerHeight();
            document.getElementById('search-input').addEventListener('input', filterChannels);
            
            player.addEventListener('waiting', () => spinner.style.display = 'block');
            player.addEventListener('playing', () => {
                spinner.style.display = 'none';
                playBtn.innerHTML = '<i class="ri-pause-fill"></i>';
            });
            player.addEventListener('pause', () => playBtn.innerHTML = '<i class="ri-play-fill"></i>');
        };

        window.onresize = adjustPlayerHeight;

        function adjustPlayerHeight() {
            if (window.innerWidth >= 768) { player.style.height = '100vh'; } 
            else { player.style.height = '35vh'; }
        }

        function showToast(msg) {
            let toast = document.getElementById('player-toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        }

        function togglePlay() {
            if (player.paused) { player.play().catch(()=>{}); } 
            else { player.pause(); }
        }

        function toggleMute() {
            player.muted = !player.muted;
            muteBtn.innerHTML = player.muted ? '<i class="ri-volume-mute-fill"></i>' : '<i class="ri-volume-up-fill"></i>';
            volumeRange.value = player.muted ? 0 : player.volume;
        }

        function setVolume(val) {
            player.volume = val;
            player.muted = (val == 0);
            muteBtn.innerHTML = (val == 0) ? '<i class="ri-volume-mute-fill"></i>' : '<i class="ri-volume-up-fill"></i>';
        }

        function toggleFullscreen() {
            let container = document.getElementById('player-container');
            if (!document.fullscreenElement) { container.requestFullscreen().catch(()=>{}); } 
            else { document.exitFullscreen(); }
        }

        // fMP4 Optimized HLS Config
        const config = {
            maxBufferLength: 30,
            maxMaxBufferLength: 600,
            manifestLoadingTimeOut: 20000,
            manifestLoadingMaxRetry: 6,
            enableWorker: true,
            lowLatencyMode: true,
            // fMP4 Streams often require specific timestamp offsets configurations
            enableEosHandler: true,
            forceKeyFrameOnDiscontinuity: true
        };

        function playChannel(url, useProxy = false) {
            spinner.style.display = 'block';
            if (currentHls) {
                currentHls.destroy();
                currentHls = null;
            }

            if ((window.location.protocol === 'https:' && url.startsWith('http://')) || useProxy) {
                showToast("Routing through secure proxy backup line...");
                url = atob(_0x4f2a[2]) + encodeURIComponent(url);
            }

            if (Hls.isSupported()) {
                currentHls = new Hls(config);
                currentHls.loadSource(url);
                currentHls.attachMedia(player);
                currentHls.on(Hls.Events.MANIFEST_PARSED, () => player.play().catch(() => {}));
                
                currentHls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        switch(data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                if (!useProxy) { playChannel(data.url || url, true); } 
                                else { currentHls.startLoad(); }
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                currentHls.recoverMediaError();
                                break;
                            default:
                                currentHls.destroy();
                                spinner.style.display = 'none';
                                showToast("Stream connection failed.");
                                break;
                        }
                    }
                });
            } else if (player.canPlayType('application/vnd.apple.mpegurl')) {
                player.src = url;
                player.addEventListener('loadedmetadata', () => player.play().catch(() => {}));
            }
        }

        async function fetchPlaylist(url) {
            try {
                let response = await fetch(url);
                if (!response.ok) response = await fetch(atob(_0x4f2a[2]) + encodeURIComponent(url));
                if (!response.ok) throw new Error();
                
                const playlistText = await response.text();
                
                // Enhanced Regular Expression to catch regular, query parameters, and fMP4 HLS manifests natively
                const cleanUrl = url.split('?')[0];
                if (!playlistText.includes('#EXTM3U') && (cleanUrl.includes('.m3u8') || cleanUrl.includes('.fmp4') || url.startsWith('http'))) {
                    return [{ name: 'DIRECT CHANNEL', url: url, logo: DEFAULT_LOGO }];
                }

                const lines = playlistText.split('\n').map(line => line.replace('\r', '').trim());
                const channels = [];

                for (let i = 0; i < lines.length; i++) {
                    let currentLine = lines[i];
                    if (currentLine.startsWith('#EXTINF')) {
                        const logoMatch = currentLine.match(/tvg-logo="([^"]*)"/) || currentLine.match(/logo="([^"]*)"/);
                        const tvgNameMatch = currentLine.match(/tvg-name="([^"]*)"/);
                        let name = 'Live Channel Stream';
                        const commaIndex = currentLine.lastIndexOf(',');
                        
                        if (commaIndex !== -1 && commaIndex < currentLine.length - 1) { name = currentLine.substring(commaIndex + 1).trim(); } 
                        else if (tvgNameMatch) { name = tvgNameMatch[1].trim(); }
                        
                        const logo = logoMatch ? logoMatch[1].trim() : '';
                        let streamUrl = '';
                        
                        for (let j = i + 1; j < lines.length; j++) {
                            let nextLine = lines[j];
                            if (nextLine.length === 0 || nextLine.startsWith('#')) continue;
                            if (nextLine.startsWith('http')) {
                                streamUrl = nextLine;
                                i = j;
                                break;
                            }
                        }
                        if (streamUrl) channels.push({ name, url: streamUrl, logo });
                    }
                }
                return channels;
            } catch (error) {
                if (url.startsWith('http')) return [{ name: 'Direct Line Stream', url: url, logo: DEFAULT_LOGO }];
                return [];
            }
        }

        async function loadAllPlaylists() {
            let combinedChannels = [];
            const requests = PLAYLIST_URLS.map(url => fetchPlaylist(url));
            const results = await Promise.all(requests);
            results.forEach(arr => combinedChannels = combinedChannels.concat(arr));
            allChannels = combinedChannels;
            renderChannels(allChannels, true);
        }

        function renderChannels(channels, isInitialLoad = false) {
            const channelList = document.getElementById('channel-list');
            channelList.innerHTML = '';
            
            if (channels.length === 0) {
                channelList.innerHTML = '<div style="padding:20px; text-align:center; color:#888;">No channels found</div>';
                return;
            }

            channels.forEach((channel, index) => {
                const item = document.createElement('div');
                item.className = 'channel-item';
                item.innerHTML = `
                    <img src="${channel.logo || DEFAULT_LOGO}" alt="${channel.name}" onerror="this.src='${DEFAULT_LOGO}'">
                    <span>${channel.name}</span>
                `;
                item.onclick = () => playChannel(channel.url);
                channelList.appendChild(item);

                if (index === 0 && isInitialLoad) playChannel(channel.url);
            });
        }

        function filterChannels() {
            const searchInput = document.getElementById('search-input').value.toLowerCase().trim();
            if (searchInput === '') {
                renderChannels(allChannels, false);
                return;
            }
            const filtered = allChannels.filter(c => c.name.toLowerCase().includes(searchInput));
            renderChannels(filtered, false);
        }
    </script>
</body>
</html>
